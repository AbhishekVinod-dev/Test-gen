<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestGen - Challenge</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #0f2b33;
            color: #4db8a8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(600px at 30% 50%, rgba(77, 184, 168, 0.08) 0%, transparent 80%),
                radial-gradient(500px at 70% 30%, rgba(91, 164, 184, 0.1) 0%, transparent 75%),
                radial-gradient(450px at 50% 70%, rgba(77, 184, 168, 0.06) 0%, transparent 70%);
            animation: blobWave 12s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: 
                radial-gradient(550px at 20% 70%, rgba(91, 164, 184, 0.07) 0%, transparent 75%),
                radial-gradient(480px at 80% 50%, rgba(77, 184, 168, 0.09) 0%, transparent 70%),
                radial-gradient(520px at 60% 20%, rgba(91, 164, 184, 0.08) 0%, transparent 75%);
            animation: blobFlow 14s ease-in-out infinite reverse;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes blobWave {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(-20px, -30px) scale(1.05); }
            50% { transform: translate(10px, -20px) scale(0.98); }
            75% { transform: translate(-10px, 25px) scale(1.02); }
            100% { transform: translate(0, 0) scale(1); }
        }

        @keyframes blobFlow {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(30px, 20px) scale(0.98); }
            50% { transform: translate(-15px, 30px) scale(1.03); }
            75% { transform: translate(20px, -25px) scale(1.01); }
            100% { transform: translate(0, 0) scale(1); }
        }

        header {
            display: none;
        }

        nav { display: none; }

        .floating-sidebar {
            position: fixed;
            left: 0;
            top: 0;
            width: 280px;
            height: 100vh;
            background: #0a1a1f;
            border-right: 2px solid #4db8a8;
            padding: 2rem 1rem;
            z-index: 100;
            overflow-y: auto;
            box-shadow: 2px 0 15px rgba(77, 184, 168, 0.1);
            display: flex;
            flex-direction: column;
        }

        .sidebar-logo {
            font-size: 1.5em;
            font-weight: 700;
            color: #4db8a8;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #1a4d54;
        }

        .sidebar-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .sidebar-nav a {
            display: block;
            color: #5ba4b8;
            text-decoration: none;
            padding: 0.9rem 1.2rem;
            border-radius: 6px;
            transition: all 0.3s;
            font-size: 0.95em;
            font-weight: 500;
        }

        .sidebar-nav a:hover {
            background: rgba(77, 184, 168, 0.12);
            color: #4db8a8;
        }

        .sidebar-nav a.active {
            background: rgba(77, 184, 168, 0.15);
            color: #4db8a8;
            border-left: 3px solid #4db8a8;
            padding-left: calc(1.2rem - 3px);
        }

        .container {
            max-width: 100%;
            margin: 0;
            margin-left: 280px;
            padding: 2rem;
            flex: 1;
            width: calc(100% - 280px);
            position: relative;
            z-index: 1;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: rgba(5, 20, 25, 0.6);
            border: 2px solid #1a4d5c;
            padding: 1.5rem;
            border-radius: 8px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }

        .stat-card .value {
            font-size: 1.8em;
            font-weight: 800;
            color: #4db8a8;
            margin-bottom: 0.5rem;
        }

        .stat-card .label {
            font-size: 0.9em;
            color: #8fa4aa;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .panel {
            background: rgba(5, 20, 25, 0.6);
            border: 2px solid #1a4d5c;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.1);
        }

        .panel h2 {
            color: #4db8a8;
            margin-bottom: 1.5rem;
            font-size: 1.3em;
            font-weight: 700;
        }


        .code-block {
            background: rgba(0, 0, 0, 0.3);
            color: #00ffcc;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            line-height: 1.6;
            margin-bottom: 1rem;
            border: 1px solid #1a4d5c;
        }

        .task-info {
            background: rgba(0, 255, 204, 0.05);
            padding: 1.5rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 3px solid #00ffcc;
        }

        .task-info .docstring {
            color: #4db8a8;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .level {
            display: inline-block;
            padding: 0.4rem 0.8rem;
            border-radius: 4px;
            font-size: 0.85em;
            font-weight: 700;
            margin-top: 0.5rem;
            background: rgba(77, 184, 168, 0.15);
            color: #4db8a8;
        }

        textarea {
            width: 100%;
            height: 250px;
            padding: 1rem;
            border: 2px solid #1a4d5c;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            resize: vertical;
            transition: all 0.3s;
            background: rgba(0, 0, 0, 0.3);
            color: #00ffcc;
        }

        textarea:focus {
            outline: none;
            border-color: #4db8a8;
            box-shadow: 0 0 10px rgba(77, 184, 168, 0.15);
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
        }

        .btn {
            flex: 1;
            min-width: 120px;
            padding: 0.9rem 1.5rem;
            border: none;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-size: 1em;
        }

        .btn-primary {
            background: #4db8a8;
            color: #0a1a1f;
            box-shadow: 0 2px 10px rgba(77, 184, 168, 0.2);
            font-weight: 700;
        }

        .btn-primary:hover {
            background: #3fa89a;
            box-shadow: 0 4px 15px rgba(77, 184, 168, 0.3);
        }

        .btn-secondary {
            background: transparent;
            color: #4db8a8;
            border: 2px solid #4db8a8;
        }

        .btn-secondary:hover {
            background: rgba(77, 184, 168, 0.1);
            box-shadow: 0 2px 10px rgba(77, 184, 168, 0.2);
        }

        .btn-ai {
            background: #5ba4b8;
            color: #0a1a1f;
            box-shadow: 0 2px 10px rgba(91, 164, 184, 0.2);
            font-weight: 700;
        }

        .btn-ai:hover {
            background: #4a94a8;
            box-shadow: 0 4px 15px rgba(91, 164, 184, 0.3);
        }

        .result {
            background: rgba(0, 255, 204, 0.05);
            padding: 2rem;
            border-radius: 8px;
            margin-top: 1.5rem;
            border-left: 3px solid #00ffcc;
            border: 2px solid #1a4d5c;
        }

        .result.success {
            background: rgba(0, 255, 204, 0.1);
            border-left-color: #00ffcc;
            border-color: #00ffcc;
        }

        .result.error {
            background: rgba(255, 80, 80, 0.1);
            border-left-color: #ff5050;
            border-color: #ff5050;
        }

        .result-status {
            font-weight: 700;
            font-size: 1.1em;
            color: #00ffcc;
        }

        .result-detail {
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            color: #7a9ca5;
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            border-radius: 6px;
            white-space: pre-wrap;
            word-wrap: break-word;
            margin-top: 1rem;
            border: 1px solid #1a4d5c;
        }

        .score-display {
            font-size: 2.5em;
            font-weight: 800;
            color: #00ffcc;
            margin: 1rem 0;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(0, 255, 204, 0.2);
            border-radius: 4px;
            overflow: hidden;
            margin-top: 1rem;
        }

        .progress-fill {
            height: 100%;
            background: #00ffcc;
            width: 0%;
            transition: width 0.3s;
            box-shadow: 0 0 10px rgba(0, 255, 204, 0.5);
        }

        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #1a4d5c; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ffcc; }

        @media (max-width: 768px) {
            .main-content { grid-template-columns: 1fr; }
            .button-group { flex-direction: column; }
            .btn { width: 100%; }
        }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="floating-sidebar">
        <div class="sidebar-logo">TestGen</div>
        <nav class="sidebar-nav">
            <a href="/">Home</a>
            <a href="game.html" class="active">Play Challenge</a>
        </nav>
    </div>

    <header>
        <div class="logo">TestGen</div>
        <nav>
            <a href="/">Home</a>
            <a href="game.html">Play Challenge</a>
        </nav>
    </header>

    <div class="container">
        <div class="stats">
            <div class="stat-card">
                <div class="value" id="totalTests">0</div>
                <div class="label">Tests Submitted</div>
            </div>
            <div class="stat-card">
                <div class="value" id="avgScore">0%</div>
                <div class="label">Average Score</div>
            </div>
            <div class="stat-card">
                <div class="value" id="bestScore">0%</div>
                <div class="label">Best Score</div>
            </div>
            <div class="stat-card">
                <div class="value" id="currentDifficulty">-</div>
                <div class="label">Difficulty</div>
            </div>
        </div>

        <div class="main-content">
            <div class="panel">
                <h2>Function to Test</h2>
                <div class="task-info">
                    <div class="docstring" id="docstring">-</div>
                    <div class="code-block" id="functionCode">// Loading...</div>
                    <span class="level" id="level">-</span>
                </div>
                <button class="btn btn-secondary" onclick="loadNewTask()">Load New Task</button>
            </div>

            <div class="panel">
                <h2>Write Your Tests</h2>
                <textarea id="testCode" placeholder="Write your test code here...&#10;&#10;def test_example():&#10;    assert function(input) == expected"></textarea>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="submitTests()">Submit Tests</button>
                    <button class="btn btn-ai" onclick="generateTestsWithAI()">Generate with AI</button>
                    <button class="btn btn-secondary" onclick="clearTests()">Clear</button>
                </div>
            </div>
        </div>

        <div class="panel">
            <h2>Results</h2>
            <div id="result" class="result hidden">
                <div class="result-status" id="resultStatus">-</div>
                <div class="score-display" id="resultScore">-</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <div class="result-detail" id="resultDetail">-</div>
            </div>
            <div id="noResult" style="text-align: center; color: #8b949e; padding: 2rem;">
                Submit tests or generate with AI to see results
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentTask = null;
        let stats = { totalTests: 0, scores: [], bestScore: null, avgScore: null };

        async function loadNewTask() {
            try {
                const response = await fetch(`${API_BASE}/reset`, { method: 'POST' });
                currentTask = await response.json();
                displayTask(currentTask);
                clearResult();
            } catch (error) {
                showError('Failed to load task: ' + error.message);
            }
        }

        function displayTask(task) {
            document.getElementById('docstring').textContent = task.docstring || 'Function';
            document.getElementById('functionCode').textContent = task.function_code;
            document.getElementById('level').textContent = (task.task_level || 'unknown').toUpperCase();
            document.getElementById('currentDifficulty').textContent = (task.task_level || 'unknown').toUpperCase();
        }

        async function submitTests() {
            const testCode = document.getElementById('testCode').value;
            if (!testCode.trim()) {
                showError('Please write some test code');
                return;
            }
            showWaiting('Evaluating your tests...');
            try {
                const response = await fetch(`${API_BASE}/step`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ test_code: testCode })
                });
                const result = await response.json();
                stats.totalTests++;
                stats.scores.push(result.reward);
                stats.bestScore = stats.bestScore === null ? result.reward : Math.max(stats.bestScore, result.reward);
                stats.avgScore = stats.scores.reduce((a, b) => a + b, 0) / stats.scores.length;
                updateStats();
                displayResult(result);
            } catch (error) {
                showError('Error evaluating tests: ' + error.message);
            }
        }

        async function generateTestsWithAI() {
            if (!currentTask) { showError('Please load a task first'); return; }
            showWaiting('Generating tests with AI...');
            try {
                const response = await fetch(`${API_BASE}/generate-tests`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ function_code: currentTask.function_code, docstring: currentTask.docstring })
                });
                const data = await response.json();
                document.getElementById('testCode').value = data.test_code;
                clearResult();
                showWaiting('Tests generated. You can now submit them for evaluation.');
            } catch (error) {
                showError('Error generating tests: ' + error.message);
            }
        }

        function displayResult(result) {
            const resultDiv = document.getElementById('result');
            const noResult = document.getElementById('noResult');
            const score = (result.reward * 100).toFixed(1);
            resultDiv.classList.remove('hidden');
            noResult.classList.add('hidden');
            if (result.info) {
                resultDiv.classList.add('error');
                document.getElementById('resultStatus').textContent = 'Test Failed';
                document.getElementById('resultScore').textContent = '-';
                document.getElementById('resultDetail').textContent = result.info;
            } else {
                resultDiv.classList.add('success');
                document.getElementById('resultStatus').textContent = 'Tests Passed - Mutation Score';
                document.getElementById('resultScore').textContent = score + '%';
                document.getElementById('resultDetail').textContent = `Your tests caught ${score}% of mutations!`;
            }
            document.getElementById('progressFill').style.width = score + '%';
        }

        function showWaiting(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden', 'success', 'error');
            document.getElementById('noResult').classList.add('hidden');
            document.getElementById('resultStatus').textContent = message;
            document.getElementById('resultScore').textContent = '-';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('resultDetail').textContent = 'Processing...';
        }

        function showError(message) {
            const resultDiv = document.getElementById('result');
            resultDiv.classList.remove('hidden', 'success');
            resultDiv.classList.add('error');
            document.getElementById('noResult').classList.add('hidden');
            document.getElementById('resultStatus').textContent = message.split('\n')[0];
            document.getElementById('resultScore').textContent = '-';
            document.getElementById('progressFill').style.width = '0%';
            document.getElementById('resultDetail').textContent = message;
        }

        function clearResult() {
            document.getElementById('result').classList.add('hidden');
            document.getElementById('noResult').classList.remove('hidden');
        }

        function clearTests() {
            document.getElementById('testCode').value = '';
            clearResult();
        }

        function updateStats() {
            document.getElementById('totalTests').textContent = stats.totalTests;
            document.getElementById('avgScore').textContent = stats.avgScore === null ? '-' : (stats.avgScore * 100).toFixed(1) + '%';
            document.getElementById('bestScore').textContent = stats.bestScore === null ? '-' : (stats.bestScore * 100).toFixed(1) + '%';
        }

        window.addEventListener('load', () => { loadNewTask(); });
    </script>
</body>
</html>
