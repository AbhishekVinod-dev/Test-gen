name: testgen_env
description: Test Case Generator Environment using mutation testing

entrypoint:
  module: app
  app: app

tasks:
  - id: easy
    description: Write tests for simple arithmetic or parity functions with clear expected outputs.

  - id: medium
    description: Write tests for list and string utilities, covering boundary cases and invariants.

  - id: hard
    description: Write tests for algorithmic functions such as searching and substring analysis.

action_space:
  type: object
  properties:
    test_code:
      type: string

observation_space:
  type: object
  properties:
    function_code:
      type: string
    docstring:
      type: string
    task_level:
      type: string